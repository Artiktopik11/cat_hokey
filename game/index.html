<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAT HOCKEY — ДЖОКЕР В ЯРОСТИ 🃏</title>
    <style>
        * { user-select: none; touch-action: none; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #0a2f3a 0%, #041a21 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; padding: 20px; overscroll-behavior: none; }
        .main-menu, .game-container { background: linear-gradient(145deg, #1e5a6e, #124252); border-radius: 64px; padding: 30px 25px; max-width: 1000px; width: 100%; box-shadow: 0 25px 40px rgba(0,0,0,0.5); }
        .game-title { font-size: 2.5rem; font-weight: 800; color: #ffd966; text-shadow: 3px 3px 0 #b45f1b; text-align: center; }
        .menu-buttons { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 30px 0; }
        .mode-btn, .joker-btn { background: linear-gradient(135deg, #f9b43a, #fb8c00); border: none; font-weight: bold; font-size: 1rem; padding: 12px 24px; border-radius: 60px; cursor: pointer; box-shadow: 0 5px 0 #b45f1b; }
        .joker-btn { background: linear-gradient(135deg, #2a2a2a, #111); color: #ffd966; border: 2px solid #ffd966; animation: jokerShake 0.5s infinite; }
        @keyframes jokerShake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        .fonk-btn { background: linear-gradient(135deg, #2c2c2c, #111); color: #ffb347; border: 2px solid #ffb347; padding: 10px 20px; border-radius: 60px; font-weight: bold; cursor: pointer; }
        .track-selector { background: #0d3b48cc; border-radius: 40px; padding: 15px; margin: 20px 0; text-align: center; }
        .track-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .track-btn { background: #1f5f6e; border: none; padding: 6px 14px; border-radius: 40px; color: white; cursor: pointer; }
        .track-btn.active { background: #ffb347; color: #2c2c2c; }
        .hidden { display: none; }
        canvas { display: block; margin: 0 auto; border-radius: 32px; width: 100%; height: auto; cursor: none; box-shadow: 0 0 0 3px white, 0 0 0 6px #b45f1b; }
        .stats-panel { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-top: 18px; background: #0d2f3bcc; padding: 12px 20px; border-radius: 60px; color: white; }
        .back-btn { background: #6c757d; border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
        .skins-grid { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .skin-card { background: #1f5f6e; border-radius: 30px; padding: 8px 16px; cursor: pointer; text-align: center; font-size: 1.5rem; border: 2px solid transparent; }
        .skin-card.selected { border-color: #ffd966; background: #2f7a8c; }
        @media (max-width: 600px) { .mode-btn, .joker-btn { font-size: 0.8rem; padding: 8px 16px; } .game-title { font-size: 1.8rem; } }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e3a3a; border-radius: 48px; padding: 20px; max-width: 450px; text-align: center; border: 4px solid #ff4444; animation: rageShake 0.1s infinite; }
        @keyframes rageShake { 0% { transform: translate(2px, 2px); } 25% { transform: translate(-2px, -2px); } 50% { transform: translate(-2px, 2px); } 75% { transform: translate(2px, -2px); } 100% { transform: translate(2px, 2px); } }
        .modal-content img { width: 100%; border-radius: 32px; margin-bottom: 15px; border: 2px solid #ff4444; }
        .joker-text { font-family: 'Courier New', monospace; font-size: 1.5rem; font-weight: bold; color: #ff4444; text-shadow: 2px 2px 0 #550000; margin: 15px 0; text-transform: uppercase; }
        .close-modal { background: #ff4444; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="mainMenu" class="main-menu">
    <div class="game-title">🏒 CAT HOCKEY — ДЖОКЕР ЭДИШН 🃏</div>
    
    <div class="track-selector">
        <div style="color:#ffd966;">🎵 ВЫБЕРИ ФОНК (5 штук!)</div>
        <div class="track-buttons" id="trackButtonsContainer"></div>
        <div style="margin-top:10px; font-size:0.8rem; color:#b9e2f0;" id="currentTrackLabel">Сейчас: GUWET PHONK</div>
    </div>

    <div class="menu-buttons">
        <button class="mode-btn" data-mode="1v1">⚔️ 1v1</button>
        <button class="mode-btn" data-mode="1v2">🐱 1v2</button>
        <button class="mode-btn" data-mode="training">🎮 ТРЕНИРОВКА</button>
        <button class="fonk-btn" id="fonkControlBtn">🔊 ФОНК: ВКЛ</button>
        <button class="joker-btn" id="jokerBtn">🃏 ДЖОКЕР (БАЛЛЫ НЕ АКТИВИРОВАНЫ!)</button>
    </div>

    <div class="skins-section" style="background:#0d3b48cc; border-radius:40px; padding:15px; margin-top:20px;">
        <div class="skins-title">😺 ВЫБЕРИ КОТИКА</div>
        <div class="skins-grid">
            <div class="skin-card" data-skin="🐱">🐱 Рыжик</div>
            <div class="skin-card" data-skin="😺">😺 Снежок</div>
            <div class="skin-card" data-skin="😸">😸 Тигрик</div>
            <div class="skin-card" data-skin="🦁">🦁 Лев</div>
        </div>
    </div>

    <div class="elo-preview" style="background:#00000066; border-radius:40px; padding:12px; text-align:center;">
        🏆 РЕЙТИНГ ELO: <span id="menuElo">1200</span>
    </div>
</div>

<div id="gameContainer" class="game-container hidden">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="stats-panel">
        <button id="backToMenuBtn" class="back-btn">🏠 МЕНЮ</button>
        <span>🐱 <span id="playerScore">0</span> : <span id="enemyScore">0</span> 🤖</span>
        <button id="resetMatchBtn" class="back-btn">🔄 СБРОС</button>
    </div>
</div>

<script>
    const backgroundImage = new Image();
    backgroundImage.src = 'https://raw.githubusercontent.com/Artiktopik11/cat_hokey/main/game/of-ice-hockey-rink-textures-blue-ice-ice-rink-top-view-illustration-background-vector.jpg';
    
    // ДЖОКЕР (твоя картинка)
    const jokerImage = new Image();
    jokerImage.src = 'https://raw.githubusercontent.com/Artiktopik11/cat_hokey/45be688f6e4f2f049f0396648eaae16518fbc074/game/joker-_1_.jpg';
    
    function showJokerRage() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <img src="${jokerImage.src}" alt="Joker Rage">
                <div class="joker-text">💢 В СМЫСЛЕ БЛЯДЬ НЕ АКТИВИРОВАНА? 💢<br>Я БАЛЛЫ ПОЛГОДА КОПИЛ! 🎴</div>
                <button class="close-modal">ЗАКРЫТЬ, БЛЯ!</button>
            </div>
        `;
        document.body.appendChild(modal);
        // Эффект тряски экрана при открытии
        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 500);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }
    
    // ========== ТРЕКИ (5 штук) ==========
    const TRACKS = {
        guwet: { name: '📼 GUWET', url: '033109582300.mp3' },
        montagem: { name: '🔥 MONTAGEM PEGADAS', url: 'n0m1ko%2C%20NVXUS%20%E2%80%94%20MONTAGEM%20PEGADAS%20(www.lightaudio.ru)%20(1).mp3' },
        montagemAtracao: { name: '⚡ MONTAGEM ATRAÇÃO', url: 'Blxze! , DJ LXILL, NVXUS — MONTAGEM ATRAÇÃO (www.lightaudio.ru).mp3' },
        sequencia: { name: '🌙 SEQUNCIA DO MADRUGADA', url: 'Elias_EE_-_SEQUNCIA_DO_MADRUGADA_ALT_VER_-_SLOWED_79679509.mp3' },
        granola: { name: '🥣 MONTAGEM GRANOLA 2', url: 'NVXUS, AzuriusS, BLXZE! , DJ LXILL — MONTAGEM GRANOLA 2 (www.lightaudio.ru).mp3' }
    };
    
    // ========== ЗВУКИ ==========
    const hitSound = new Audio('Udar.mp3');
    const whistleSound = new Audio('svistok.mp3');
    const crowdSound = new Audio('tribuna.mp3');
    crowdSound.loop = true;
    crowdSound.volume = 0.3;
    
    function playHit() { if (gameActive && soundEnabled) { hitSound.currentTime = 0; hitSound.play().catch(e => {}); } }
    function playWhistle() { if (gameActive && soundEnabled) { whistleSound.currentTime = 0; whistleSound.play().catch(e => {}); } }
    
    let currentTrackId = 'guwet';
    let audio = new Audio();
    let fonkEnabled = true;
    let soundEnabled = true;
    let gameActive = false;
    
    function buildTrackButtons() {
        const container = document.getElementById('trackButtonsContainer');
        container.innerHTML = '';
        for (const [id, track] of Object.entries(TRACKS)) {
            const btn = document.createElement('button');
            btn.className = 'track-btn' + (id === currentTrackId ? ' active' : '');
            btn.textContent = track.name;
            btn.onclick = () => loadTrack(id);
            container.appendChild(btn);
        }
    }
    
    function loadTrack(trackId) {
        const track = TRACKS[trackId];
        if (!track) return;
        const wasPlaying = fonkEnabled && !audio.paused;
        audio.pause();
        audio = new Audio(track.url);
        audio.loop = true;
        audio.volume = 0.7;
        if (wasPlaying && fonkEnabled) audio.play().catch(e => {});
        currentTrackId = trackId;
        document.getElementById('currentTrackLabel').innerHTML = `Сейчас: ${track.name}`;
        document.querySelectorAll('.track-btn').forEach(btn => btn.classList.remove('active'));
        const idx = Object.keys(TRACKS).indexOf(trackId);
        if (document.querySelectorAll('.track-btn')[idx]) 
            document.querySelectorAll('.track-btn')[idx].classList.add('active');
    }
    
    function toggleFonk() {
        const btn = document.getElementById('fonkControlBtn');
        if (fonkEnabled) {
            audio.pause();
            fonkEnabled = false;
            btn.innerHTML = '🔇 ФОНК: ВЫКЛ';
            btn.style.background = '#444';
        } else {
            audio.play().catch(e => {});
            fonkEnabled = true;
            btn.innerHTML = '🔊 ФОНК: ВКЛ';
            btn.style.background = 'linear-gradient(135deg, #2c2c2c, #111)';
        }
    }
    
    function firstPlay() {
        if (fonkEnabled && audio.paused) audio.play().catch(e => {});
        document.removeEventListener('click', firstPlay);
        document.removeEventListener('touchstart', firstPlay);
    }
    document.addEventListener('click', firstPlay);
    document.addEventListener('touchstart', firstPlay);
    
    // ========== ИГРА ==========
    let currentMode = '1v1';
    let selectedSkin = '🐱';
    let currentElo = 1200;
    let playerScore = 0, enemyScore = 0;
    let playerX = 365, enemyX = 365;
    let puck = { x: 400, y: 250, vx: 2.2, vy: -2.2, r: 9 };
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 500;
    
    function updateGame() {
        if (!gameActive) return;
        puck.x += puck.vx;
        puck.y += puck.vy;
        if (puck.x - puck.r <= 0 || puck.x + puck.r >= 800) { puck.vx = -puck.vx; playHit(); }
        if (puck.y - puck.r <= 0) { puck.vy = Math.abs(puck.vy); playHit(); }
        if (puck.y + puck.r >= 485) { enemyScore++; playWhistle(); updateUI(); resetPuck(); }
        if (puck.y - puck.r <= 15) { playerScore++; playWhistle(); updateUI(); resetPuck(); }
        if (puck.y + puck.r >= 450 && puck.x + puck.r >= playerX && puck.x - puck.r <= playerX + 70) {
            let angle = ((puck.x - playerX) / 70 - 0.5) * 1.6;
            let sp = Math.hypot(puck.vx, puck.vy) * 1.08;
            puck.vx = Math.cos(angle) * sp;
            puck.vy = -Math.abs(Math.sin(angle) * sp);
            puck.y = 449 - puck.r;
            playHit();
        }
        let target = puck.x - 35;
        target = Math.min(Math.max(target, 10), 720);
        enemyX += (target - enemyX) * 0.09;
        if (puck.y - puck.r <= 51 && puck.y + puck.r >= 25 && puck.x + puck.r >= enemyX && puck.x - puck.r <= enemyX + 70) {
            let angle = ((puck.x - enemyX) / 70 - 0.5) * 1.5;
            let sp = Math.hypot(puck.vx, puck.vy) * 1.05;
            puck.vx = Math.cos(angle) * sp;
            puck.vy = Math.abs(Math.sin(angle) * sp);
            puck.y = 52;
            playHit();
        }
    }
    
    function resetPuck() { puck = { x: 400, y: 250, vx: (Math.random() - 0.5) * 3.5, vy: (Math.random() - 0.5) * 3, r: 9 }; }
    function updateUI() {
        document.getElementById('playerScore').innerText = playerScore;
        document.getElementById('enemyScore').innerText = enemyScore;
    }
    
    function draw() {
        ctx.clearRect(0, 0, 800, 500);
        if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
            ctx.drawImage(backgroundImage, 0, 0, 800, 500);
        } else {
            ctx.fillStyle = '#aacfaa';
            ctx.fillRect(0, 0, 800, 500);
        }
        ctx.fillStyle = '#4a704a';
        ctx.fillRect(playerX, 450, 70, 26);
        ctx.font = '26px monospace';
        ctx.fillStyle = '#f9f2cf';
        ctx.fillText(selectedSkin, playerX+22, 470);
        ctx.fillStyle = '#b57a4a';
        ctx.fillRect(enemyX, 25, 70, 26);
        ctx.fillStyle = '#2f2a1f';
        ctx.fillText('😾', enemyX+24, 48);
        ctx.fillStyle = '#2a3a2a';
        ctx.beginPath();
        ctx.arc(puck.x, puck.y, 8, 0, Math.PI*2);
        ctx.fill();
    }
    
    function loop() { updateGame(); draw(); requestAnimationFrame(loop); }
    
    function startGame(mode) {
        currentMode = mode;
        gameActive = true;
        playerScore = 0;
        enemyScore = 0;
        updateUI();
        resetPuck();
        playerX = 365;
        enemyX = 365;
        if (soundEnabled) crowdSound.play().catch(e => {});
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameContainer').classList.remove('hidden');
    }
    
    function back() {
        gameActive = false;
        crowdSound.pause();
        crowdSound.currentTime = 0;
        document.getElementById('mainMenu').classList.remove('hidden');
        document.getElementById('gameContainer').classList.add('hidden');
    }
    
    function resetMatch() {
        playerScore = 0;
        enemyScore = 0;
        updateUI();
        resetPuck();
        gameActive = true;
    }
    
    function move(e) {
        if (!gameActive) return;
        let rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left) * (800 / rect.width);
        playerX = Math.min(Math.max(x - 35, 10), 720);
    }
    
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(e.touches[0]) move(e.touches[0]); });
    canvas.addEventListener('touchstart', (e) => e.preventDefault());
    
    document.querySelectorAll('[data-mode]').forEach(btn => btn.onclick = () => startGame(btn.getAttribute('data-mode')));
    document.querySelectorAll('.skin-card').forEach(card => {
        card.onclick = () => {
            document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedSkin = card.getAttribute('data-skin');
        };
    });
    document.querySelector('.skin-card').classList.add('selected');
    
    document.getElementById('fonkControlBtn').onclick = toggleFonk;
    document.getElementById('backToMenuBtn').onclick = back;
    document.getElementById('resetMatchBtn').onclick = resetMatch;
    document.getElementById('jokerBtn').onclick = showJokerRage;
    
    buildTrackButtons();
    loadTrack('guwet');
    
    const saved = localStorage.getItem('cat_elo');
    if(saved) currentElo = parseInt(saved);
    document.getElementById('menuElo').innerText = currentElo;
    
    loop();
</script>
</body>
  </html>
